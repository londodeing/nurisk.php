# /etc/nginx/sites-available/nurisk
# sudo ln -sf /etc/nginx/sites-available/nurisk /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# Production config untuk NURISK — Nginx sebagai reverse proxy ke PHP-FPM.
# Jika menggunakan RoadRunner, proxy_pass ke http://127.0.0.1:8080.

server {
    listen 80;
    server_name nurisk.org www.nurisk.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name nurisk.org www.nurisk.org;

    # SSL — Let's Encrypt (certbot)
    ssl_certificate     /etc/letsencrypt/live/nurisk.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nurisk.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root /var/www/nurisk/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_proxied any;

    # Logs
    access_log /var/log/nginx/nurisk.access.log;
    error_log  /var/log/nginx/nurisk.error.log warn;

    # Client limits
    client_max_body_size 32M;
    client_body_timeout  30s;

    # Root location — Laravel entry point
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM — Laravel
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.5-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
        fastcgi_connect_timeout 10;
        fastcgi_hide_header X-Powered-By;
    }

    # Static assets — long cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|woff2?|svg|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Health endpoint — no auth required
    location = /health {
        allow all;
        try_files $uri /index.php?$query_string;
    }
}
