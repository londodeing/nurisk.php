; /etc/php/8.3/fpm/pool.d/nurisk.conf
; sudo systemctl restart php8.3-fpm setelah perubahan
;
; Production pool untuk NURISK.
; pm=dynamic: worker PHP naik/turun sesuai beban.

[nurisk]
user = www-data
group = www-data

listen = /var/run/php/php8.3-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Process manager
pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 1000

; Timeouts
request_terminate_timeout = 60s

; PHP settings
php_admin_value[error_log] = /var/www/nurisk/storage/logs/php-fpm-error.log
php_admin_flag[log_errors] = on
php_value[memory_limit] = 256M
php_value[upload_max_filesize] = 32M
php_value[post_max_size] = 32M
php_value[max_execution_time] = 60

; OPcache — production
php_value[opcache.enable] = 1
php_value[opcache.memory_consumption] = 128
php_value[opcache.max_accelerated_files] = 10000
php_value[opcache.validate_timestamps] = 0
